name: Update Custom Stats Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Generate stats data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |

          COMMITS=0

          for repo in $(gh repo list Nitish-0710 --limit 100 --json name -q '.[].name'); do

            COUNT=$(gh api repos/Nitish-0710/$repo/commits \
              --paginate \
              --jq '.[].sha' | wc -l)

            COMMITS=$((COMMITS + COUNT))

          done



          CONTRIBUTIONS=$(gh api graphql -f query='
          {
            user(login: "Nitish-0710") {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                }
              }
            }
          }' \
          --jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')



          LAST_YEAR_COMMITS=$(gh api graphql -f query='
          {
            user(login: "Nitish-0710") {
              contributionsCollection {
                totalCommitContributions
              }
            }
          }' \
          --jq '.data.user.contributionsCollection.totalCommitContributions')



          STARS=$(gh api graphql -f query='
          {
            user(login: "Nitish-0710") {
              repositories(first: 100) {
                nodes {
                  stargazerCount
                }
              }
            }
          }' \
          --jq '[.data.user.repositories.nodes[].stargazerCount] | add')



          PRS=$(gh api graphql -f query='
          {
            user(login: "Nitish-0710") {
              pullRequests {
                totalCount
              }
            }
          }' \
          --jq '.data.user.pullRequests.totalCount')



          cat > .github/profile/stats.json <<EOF
          {
            "commits": $COMMITS,
            "contributions": $CONTRIBUTIONS,
            "stars": $STARS,
            "lastYearCommits": $LAST_YEAR_COMMITS,
            "prs": $PRS,
            "updated": "$(date +%Y-%m-%d)"
          }
          EOF



      - name: Generate SVG card

        run: |

          DATA=$(cat .github/profile/stats.json)


          COMMITS=$(echo $DATA | jq '.commits')

          CONTRIBUTIONS=$(echo $DATA | jq '.contributions')

          STARS=$(echo $DATA | jq '.stars')

          LAST_YEAR_COMMITS=$(echo $DATA | jq '.lastYearCommits')

          PRS=$(echo $DATA | jq '.prs')



          cat > .github/profile/card.svg <<EOF
          <svg width="495" height="300" viewBox="0 0 495 300" xmlns="http://www.w3.org/2000/svg">
          
          <style>
          text {
            font-family: Segoe UI, Ubuntu, Sans-Serif;
          }
          </style>
          
          
          <rect width="495" height="300" rx="10" fill="#0d1117"/>
          
          
          
          <text x="25" y="45" fill="#ffffff" font-size="22" font-weight="700">
          Nitish Sahu's GitHub Stats
          </text>
          
          
          
          <text x="25" y="85" fill="#8b949e" font-size="16">
          ⭐ Total Stars Earned:
          </text>
          
          <text x="260" y="85" fill="#ffffff" font-size="16">
          $STARS
          </text>
          
          
          
          <text x="25" y="125" fill="#8b949e" font-size="16">
          🚀 Total Commits (all time):
          </text>
          
          <text x="260" y="125" fill="#ffffff" font-size="16">
          $COMMITS
          </text>
          
          
          
          <text x="25" y="165" fill="#8b949e" font-size="16">
          📈 Contributions (last year):
          </text>
          
          <text x="260" y="165" fill="#ffffff" font-size="16">
          $CONTRIBUTIONS
          </text>
          
          
          
          <text x="25" y="205" fill="#8b949e" font-size="16">
          🔥 Total Commits (last year):
          </text>
          
          <text x="260" y="205" fill="#ffffff" font-size="16">
          $LAST_YEAR_COMMITS
          </text>
          
          
          
          <text x="25" y="245" fill="#8b949e" font-size="16">
          🔀 Total PRs:
          </text>
          
          <text x="260" y="245" fill="#ffffff" font-size="16">
          $PRS
          </text>
          
          
          
          <text x="25" y="280" fill="#8b949e" font-size="14">
          Updated automatically
          </text>
          
          
          </svg>
          EOF



      - name: Commit updates

        run: |

          git config user.name "github-actions"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git add .github/profile/card.svg .github/profile/stats.json


          git commit -m "Update stats card" || echo "No changes"


          git push
