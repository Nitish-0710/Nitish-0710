name: Update Custom Stats Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=0

          for repo in $(gh repo list Nitish-0710 --limit 100 --json name -q '.[].name'); do
            COUNT=$(gh api repos/Nitish-0710/$repo/commits --paginate --jq '.[].sha' | wc -l)
            COMMITS=$((COMMITS + COUNT))
          done

          CONTRIBUTIONS=$(gh api graphql -f query='
          {
            user(login: "Nitish-0710") {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                }
              }
            }
          }' --jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')

          STARS=$(gh api user/starred --paginate --jq length | awk '{s+=$1} END {print s+0}')

          cat > .github/profile/stats.json <<EOF
          {
            "commits": $COMMITS,
            "contributions": $CONTRIBUTIONS,
            "stars": $STARS,
            "updated": "$(date +%Y-%m-%d)"
          }
          EOF

      - name: Generate SVG card
        run: |
          DATA=$(cat .github/profile/stats.json)

          COMMITS=$(echo $DATA | jq '.commits')
          CONTRIBUTIONS=$(echo $DATA | jq '.contributions')
          STARS=$(echo $DATA | jq '.stars')

          cat > .github/profile/card.svg <<EOF
          <svg width="500" height="220" xmlns="http://www.w3.org/2000/svg">
            <rect width="500" height="220" rx="15" fill="#0d1117"/>

            <text x="30" y="50" fill="white" font-size="24">
              Nitish-0710 Stats
            </text>

            <text x="30" y="95" fill="#58a6ff" font-size="20">
              ­¤ÜĆ Total Commits: $COMMITS
            </text>

            <text x="30" y="130" fill="#58a6ff" font-size="20">
              ­¤ōł Contributions: $CONTRIBUTIONS
            </text>

            <text x="30" y="165" fill="#58a6ff" font-size="20">
              ŌŁÉ Stars: $STARS
            </text>

            <text x="30" y="200" fill="#8b949e" font-size="14">
              Updated automatically
            </text>

          </svg>
          EOF

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Update stats card" || exit 0
          git push
